# Deployment overlay — observability tier ONLY. postgres/redis removed: the
# llm-verifier app uses SQLite (LLM_DB_PATH) and never connected to them.
# Loopback-only publishing; fail-fast on missing secret.
version: "3"
services:
  prometheus:
    image: docker.io/prom/prometheus:latest
    volumes: ["./prometheus.yml:/etc/prometheus/prometheus.yml:ro"]
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    ports: ["127.0.0.1:59090:9090"]
  grafana:
    image: docker.io/grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports: ["127.0.0.1:53000:3000"]
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
  node-exporter:
    image: docker.io/prom/node-exporter:latest
    command:
      - "--path.rootfs=/host"
    ports: ["127.0.0.1:59100:9100"]
    volumes:
      - "/:/host:ro,rslave"
volumes:
  grafana_data:
